name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      uses: android-actions/setup-android@v4

    - name: Install required SDK components
      run: |
        sdkmanager "platform-tools" \
                   "platforms;android-34" \
                   "build-tools;34.0.0" \
                   "cmdline-tools;latest"

    - name: Accept licenses
      run: yes | sdkmanager --licenses

    - name: Setup Gradle (cache disabled)
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: 8.2.1
        cache-disabled: true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK and capture output
      run: |
        ./gradlew assembleDebug --stacktrace --info | tee build_output.txt
      continue-on-error: true

    - name: Commit build log
      if: github.event_name == 'push'
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add build_output.txt
        git commit -m "Update build output log" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}
